# Bot Proxy — nginx 主站配置
#
# 安装步骤:
#   1. sudo cp templates/nginx-site.conf /etc/nginx/conf.d/bot-proxy.conf
#   2. sudo mkdir -p /etc/nginx/conf.d/tenants
#   3. sudo nginx -t && sudo nginx -s reload
#
# 每个租户实例的反代配置由 provision 系统自动生成到 /etc/nginx/conf.d/tenants/*.conf
# 包括: /webhook/{platform}/{tenant_id} 和 /oauth/{tenant_id}/callback
# Admin Dashboard 在本文件直接配置（全局路由，不是 per-tenant）

server {
    listen 80;
    server_name _;

    # 全局设置
    client_max_body_size 50m;

    # 引入所有租户的反代配置（每个 .conf 文件包含该租户的 location 块）
    # 包含 webhook + OAuth callback + health 路由
    include /etc/nginx/conf.d/tenants/*.conf;

    # OAuth 回调 fallback — 仅用于未迁移到独立容器的租户
    # 已迁移的租户走 /oauth/{tenant_id}/callback（由 tenants/*.conf 提供）
    # 如果所有租户都已迁移，可以把这段改成 return 404
    location /oauth/callback {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin Dashboard — 路由到 code-bot 容器（任意容器均可，共享 Redis）
    # 认证由应用层 ADMIN_TOKEN Bearer token 控制
    location /admin/ {
        proxy_pass http://127.0.0.1:8101/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 全局健康检查
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # 默认 — 未匹配的路径
    location / {
        return 404 '{"error": "not found"}';
        add_header Content-Type application/json;
    }
}
