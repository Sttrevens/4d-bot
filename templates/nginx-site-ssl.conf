# Bot Proxy — nginx 主站配置（带 HTTPS/SSL）
#
# 前置条件:
#   1. 安装 certbot: sudo apt install certbot python3-certbot-nginx
#   2. 获取证书: sudo certbot --nginx -d YOUR_DOMAIN
#      或: sudo certbot certonly --standalone -d YOUR_DOMAIN
#   3. 替换下方 YOUR_DOMAIN 为实际域名
#
# 安装步骤:
#   1. sudo cp templates/nginx-site-ssl.conf /etc/nginx/conf.d/bot-proxy.conf
#   2. sudo mkdir -p /etc/nginx/conf.d/tenants
#   3. 编辑 /etc/nginx/conf.d/bot-proxy.conf，替换 YOUR_DOMAIN
#   4. sudo nginx -t && sudo nginx -s reload
#
# 自动续期（certbot 默认已配置 systemd timer / cron）:
#   sudo certbot renew --dry-run   # 测试续期

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt 验证路径（certbot 需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL 证书（Let's Encrypt 自动生成的路径）
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # SSL 安全配置（Mozilla Intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS（启用后浏览器强制用 HTTPS，慎重开启）
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # 全局设置
    client_max_body_size 50m;

    # 引入所有租户的反代配置（webhook + OAuth callback + health）
    include /etc/nginx/conf.d/tenants/*.conf;

    # OAuth 回调 fallback — 仅用于未迁移到独立容器的租户
    # 已迁移的租户走 /oauth/{tenant_id}/callback（由 tenants/*.conf 提供）
    location /oauth/callback {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Dashboard — 路由到 code-bot 容器（任意容器均可，共享 Redis）
    # 认证由应用层 ADMIN_TOKEN Bearer token 控制
    location /admin/ {
        proxy_pass http://127.0.0.1:8101/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 全局健康检查
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # 默认
    location / {
        return 404 '{"error": "not found"}';
        add_header Content-Type application/json;
    }
}
